# Paperclip Routic 专用 Postgres
services:
  db:
    image: postgres:17-alpine
    container_name: paperclip-routic-db
    environment:
      POSTGRES_USER: routic
      POSTGRES_PASSWORD: routic
      POSTGRES_DB: routic
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routic -d routic"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5433:5432"
    volumes:
      - routic_pgdata:/var/lib/postgresql/data

volumes:
  routic_pgdata:
